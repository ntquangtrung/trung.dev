name: Orchestrator - CI, Test, and Deploy

on:
  workflow_dispatch:  # Manual trigger

permissions:
  contents: read

jobs:
  ci:
    name: Run CI Pipeline
    uses: ./.github/workflows/ci.yml
    permissions:
      contents: read

  deploy:
    name: Deploy to Production
    needs: ci
    uses: ./.github/workflows/deploy.yml
    secrets: inherit
    permissions:
      contents: read
