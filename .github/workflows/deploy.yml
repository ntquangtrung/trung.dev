name: Manual Deploy to Ubuntu Server

on:
  workflow_call:  # Allow this workflow to be called by other workflows
  workflow_dispatch:  # Manual trigger only

permissions:
  contents: read

jobs:
  deploy:
    name: Deploy to Ubuntu Server
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.9.1
      with:
        ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

    - name: Deploy via SSH
      env:
        SERVER_USER: ${{ secrets.SERVER_USER }}
        SERVER_HOST: ${{ secrets.SERVER_HOST }}
        DEPLOY_PATH: ${{ vars.DEPLOY_PATH }}
        REPO_URL: https://${{ secrets.DEPLOY_PAT_TOKEN }}@github.com/${{ github.repository }}.git
        BRANCH: ${{ github.ref_name }}
      run: |
        ssh -o StrictHostKeyChecking=no $SERVER_USER@$SERVER_HOST << EOF
          set -e
          # Check if parent directory exists
          EXPANDED_DEPLOY_PATH=\$(eval echo "$DEPLOY_PATH")
          PARENT_DIR=\$(dirname "\$EXPANDED_DEPLOY_PATH")
          if [ ! -d "\$PARENT_DIR" ]; then
            echo "❌ Error: Parent directory '\$PARENT_DIR' does not exist on server"
            echo "Please create the parent directory first or update DEPLOY_PATH variable"
            exit 1
          fi
          # Clone or pull repo
          if [ ! -d "\$EXPANDED_DEPLOY_PATH" ]; then
            echo "📦 Cloning repository to \$EXPANDED_DEPLOY_PATH..."
            git clone "$REPO_URL" "\$EXPANDED_DEPLOY_PATH"
          fi
          cd "\$EXPANDED_DEPLOY_PATH"
          git pull --rebase origin $BRANCH
          # Verify .env exists on server (managed independently, not via CI)
          if [ ! -f .env ]; then
            echo "❌ Error: .env file not found at \$EXPANDED_DEPLOY_PATH/.env"
            echo "Create it manually on the server first. See .env.example for required variables."
            exit 1
          fi
          # Deploy
          bash scripts/deploy.sh
        EOF
